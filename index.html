<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SmartCart — IoT Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1c1c27;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #3dd68c;
    --text: #e8e8f0;
    --muted: #7070a0;
    --danger: #ff4d6d;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(108,99,255,.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 80% 80%, rgba(255,101,132,.1) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .wrapper { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; }
  .logo-icon {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: grid; place-items: center; font-size: 1.3rem;
    box-shadow: 0 8px 24px rgba(108,99,255,.35);
  }
  header h1 { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; letter-spacing: -.5px; }
  header h1 span { color: var(--accent); }
  .cart-id-badge {
    margin-left: auto;
    background: var(--card);
    border: 1px solid var(--border);
    padding: .35rem .8rem;
    border-radius: 99px;
    font-size: .78rem; color: var(--muted);
    font-family: 'Syne', sans-serif;
  }
  .cart-id-badge b { color: var(--text); }
  .status-bar {
    display: flex; align-items: center; gap: .6rem;
    padding: .75rem 1.1rem;
    border-radius: var(--radius);
    font-size: .85rem; font-weight: 500;
    margin-bottom: 1.5rem;
    border: 1px solid transparent;
    transition: all .4s;
  }
  .status-bar.unpaid { background: rgba(255,77,109,.08); border-color: rgba(255,77,109,.25); color: #ff8099; }
  .status-bar.paid   { background: rgba(61,214,140,.08); border-color: rgba(61,214,140,.25); color: var(--green); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 1.5s infinite; }
  .unpaid .status-dot { background: var(--danger); }
  .paid   .status-dot { background: var(--green); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }
  .grid { display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; }
  @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-header {
    padding: 1.1rem 1.4rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: .6rem;
  }
  .card-header h2 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
  .count-badge { background: var(--accent); color: #fff; font-size: .72rem; font-weight: 700; padding: .15rem .5rem; border-radius: 99px; font-family: 'Syne', sans-serif; }
  .item-list { padding: .5rem 0; min-height: 120px; }
  .item-row {
    display: flex; align-items: center; gap: 1rem;
    padding: .85rem 1.4rem;
    border-bottom: 1px solid var(--border);
    transition: background .2s;
    animation: slideIn .3s ease;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: rgba(255,255,255,.03); }
  @keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
  .item-icon { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg,rgba(108,99,255,.2),rgba(255,101,132,.2)); display: grid; place-items: center; font-size: 1.1rem; flex-shrink: 0; }
  .item-info { flex: 1; }
  .item-name { font-size: .9rem; font-weight: 500; color: var(--text); text-transform: capitalize; }
  .item-qty  { font-size: .78rem; color: var(--muted); margin-top: 2px; }
  .item-price { font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 700; color: var(--text); }
  .btn-delete {
    background: rgba(255,77,109,.12); border: 1px solid rgba(255,77,109,.25);
    color: var(--danger); width: 32px; height: 32px; border-radius: 8px;
    cursor: pointer; font-size: 1rem; display: grid; place-items: center;
    transition: all .2s; flex-shrink: 0;
  }
  .btn-delete:hover { background: rgba(255,77,109,.25); transform: scale(1.05); }
  .btn-delete:disabled { opacity: .4; cursor: default; transform: none; }
  .empty-state { padding: 2.5rem 1.4rem; text-align: center; color: var(--muted); font-size: .9rem; }
  .empty-state span { font-size: 2rem; display: block; margin-bottom: .5rem; }
  .loading-state { padding: 2rem 1.4rem; text-align: center; color: var(--muted); font-size: .85rem; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto .8rem; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.4rem; position: sticky; top: 1rem; height: fit-content; }
  .summary-card h2 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 1.2rem; }
  .summary-row { display: flex; justify-content: space-between; font-size: .85rem; color: var(--muted); margin-bottom: .7rem; }
  .summary-row.total { color: var(--text); font-family: 'Syne', sans-serif; font-size: 1.05rem; font-weight: 700; padding-top: .7rem; border-top: 1px solid var(--border); margin-top: .4rem; }
  .summary-row span:last-child { color: var(--text); }
  .summary-row.total span:last-child { color: var(--accent); font-size: 1.2rem; }
  .divider { height: 1px; background: var(--border); margin: 1.2rem 0; }
  .pay-label { font-size: .75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: .6rem; }
  .pay-methods { display: flex; gap: .6rem; margin-bottom: 1.2rem; }
  .pay-method { flex: 1; padding: .6rem; border-radius: 10px; border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; text-align: center; font-size: .78rem; color: var(--muted); transition: all .2s; }
  .pay-method .pm-icon { font-size: 1.2rem; display: block; margin-bottom: 3px; }
  .pay-method:hover { border-color: var(--accent); color: var(--text); }
  .pay-method.active { border-color: var(--accent); background: rgba(108,99,255,.12); color: var(--text); }
  .field { margin-bottom: .9rem; }
  .field label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: .35rem; }
  .field input { width: 100%; padding: .65rem .9rem; background: var(--surface); border: 1.5px solid var(--border); border-radius: 9px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .88rem; outline: none; transition: border-color .2s; }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }
  .field-row { display: flex; gap: .7rem; }
  .field-row .field { flex: 1; }
  .btn-pay { width: 100%; padding: .9rem; background: linear-gradient(135deg, var(--accent), #9b8fff); color: #fff; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all .25s; box-shadow: 0 6px 20px rgba(108,99,255,.35); display: flex; align-items: center; justify-content: center; gap: .5rem; }
  .btn-pay:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(108,99,255,.45); }
  .btn-pay:active { transform: translateY(0); }
  .btn-pay:disabled { opacity: .5; cursor: default; transform: none; }
  .success-overlay { position: fixed; inset: 0; background: rgba(10,10,15,.92); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(12px); opacity: 0; pointer-events: none; transition: opacity .4s; }
  .success-overlay.show { opacity: 1; pointer-events: all; }
  .success-box { background: var(--card); border: 1px solid rgba(61,214,140,.3); border-radius: 20px; padding: 2.5rem 3rem; text-align: center; animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes popIn { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
  .success-icon { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
  .success-box h2 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--green); margin-bottom: .5rem; }
  .success-box p { color: var(--muted); font-size: .9rem; }
  .btn-done { margin-top: 1.5rem; padding: .7rem 2rem; background: var(--green); color: #0a0a0f; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; font-size: .95rem; transition: opacity .2s; }
  .btn-done:hover { opacity: .85; }
  .paid-banner { background: rgba(61,214,140,.08); border: 1px solid rgba(61,214,140,.3); border-radius: 10px; padding: 1.1rem; text-align: center; color: var(--green); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
  .paid-banner span { font-size: 1.4rem; display: block; margin-bottom: .3rem; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--card); border: 1px solid var(--border); padding: .7rem 1.4rem; border-radius: 99px; font-size: .85rem; color: var(--text); box-shadow: 0 8px 30px rgba(0,0,0,.4); transition: transform .3s cubic-bezier(.34,1.56,.64,1); z-index: 99; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="logo-icon">🛒</div>
    <h1>Smart<span>Cart</span></h1>
    <div class="cart-id-badge">Cart: <b id="cartIdLabel">—</b></div>
  </header>

  <div class="status-bar unpaid" id="statusBar">
    <div class="status-dot"></div>
    <span id="statusText">Payment Pending</span>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-header">
        <h2>Scanned Items</h2>
        <div class="count-badge" id="itemCount">0</div>
      </div>
      <div class="item-list" id="itemList">
        <div class="loading-state">
          <div class="spinner"></div>
          Connecting to database…
        </div>
      </div>
    </div>

    <div class="summary-card">
      <h2>Order Summary</h2>
      <div class="summary-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
      <div class="summary-row"><span>Tax (0%)</span><span>₹0</span></div>
      <div class="summary-row total"><span>Total</span><span id="totalDisplay">₹0</span></div>
      <div class="divider"></div>

      <div id="paymentSection">
        <p class="pay-label">Payment Method</p>
        <div class="pay-methods">
          <div class="pay-method active" data-method="card" onclick="selectMethod(this)">
            <span class="pm-icon">💳</span>Card
          </div>
          <div class="pay-method" data-method="upi" onclick="selectMethod(this)">
            <span class="pm-icon">📲</span>UPI
          </div>
          <div class="pay-method" data-method="cash" onclick="selectMethod(this)">
            <span class="pm-icon">💵</span>Cash
          </div>
        </div>

        <div id="cardFields">
          <div class="field">
            <label>Card Number</label>
            <input type="text" placeholder="1234 5678 9012 3456" maxlength="19" id="cardNum" oninput="fmtCard(this)"/>
          </div>
          <div class="field-row">
            <div class="field"><label>Expiry</label><input type="text" placeholder="MM/YY" maxlength="5" id="expiry" oninput="fmtExpiry(this)"/></div>
            <div class="field"><label>CVV</label><input type="password" placeholder="•••" maxlength="3"/></div>
          </div>
        </div>

        <div id="upiFields" style="display:none">
          <div class="field"><label>UPI ID</label><input type="text" placeholder="name@upi"/></div>
        </div>

        <div id="cashFields" style="display:none">
          <div class="field"><label>Amount Tendered (₹)</label><input type="number" placeholder="Enter amount" id="cashAmount"/></div>
        </div>

        <button class="btn-pay" id="payBtn" onclick="processPayment()">🔒 Pay Now</button>
      </div>

      <div id="paidBanner" style="display:none">
        <div class="paid-banner">
          <span>✅</span>
          Payment Complete!<br/>
          <small style="font-weight:400;font-size:.8rem;color:#7070a0">Database updated to PAID</small>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-box">
    <span class="success-icon">🎉</span>
    <h2>Payment Successful!</h2>
    <p>Your order has been confirmed.<br/>Database updated to <b>PAID</b>.</p>
    <button class="btn-done" onclick="closeSuccess()">Done</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ✅ Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔥 REPLACE THESE WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAMNfE_uY1nmuAvbVW9gclisL31z-y6bMs",
  authDomain: "iot-project-6b7f8.firebaseapp.com",
  databaseURL: "https://iot-project-6b7f8-default-rtdb.firebaseio.com",
  projectId: "iot-project-6b7f8",
  storageBucket: "iot-project-6b7f8.firebasestorage.app",
  messagingSenderId: "483925728129",
  appId: "1:483925728129:web:ce52f8604895f4a568e680",
  measurementId: "G-1HT0WWNJEP"
};

const CART_ID = "Cart_01"; // ← change if your node is named differently

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const cartRef = ref(db, CART_ID);

document.getElementById("cartIdLabel").textContent = CART_ID;

const ICONS = { default:"📦", fruit:"🍎", milk:"🥛", bread:"🍞", water:"💧", juice:"🧃", egg:"🥚", rice:"🌾", coffee:"☕", tea:"🍵" };
function getIcon(name) {
  const n = (name||"").toLowerCase();
  for (const [k,v] of Object.entries(ICONS)) if (n.includes(k)) return v;
  return ICONS.default;
}

onValue(cartRef, (snap) => {
  const data = snap.val();

  const itemListEl = document.getElementById("itemList");
  const itemCountEl = document.getElementById("itemCount");
  const subtotalEl = document.getElementById("subtotal");
  const totalEl = document.getElementById("totalDisplay");

  // 🧼 RESET UI FIRST (prevents stale values)
  itemListEl.innerHTML = `
    <div class="empty-state"><span>🛒</span>Cart is empty</div>
  `;
  itemCountEl.textContent = "0";
  subtotalEl.textContent = "₹0";
  totalEl.textContent = "₹0";

  if (!data) return;

  const items = data.items || {};
  const isPaid = data.payment_status === "PAID";

  const keys = Object.keys(items);

  // 🔄 STATUS BAR
  const bar = document.getElementById("statusBar");
  if (isPaid) {
    bar.className = "status-bar paid";
    document.getElementById("statusText").textContent = "Payment Complete ✓";
  } else {
    bar.className = "status-bar unpaid";
    document.getElementById("statusText").textContent = "Payment Pending";
  }

  // 🧮 CALCULATE TOTAL FROM ITEMS (REAL FIX)
  let total = 0;

  if (keys.length > 0) {
    itemListEl.innerHTML = keys.map(key => {
      const item = items[key];
      const name = item.name || key;
      const price = item.price || 0;
      const qty = item.qty || item.quantity || 1;

      total += price * qty; // ✅ real calculation

      return `
        <div class="item-row" id="row-${key}">
          <div class="item-icon">${getIcon(name)}</div>
          <div class="item-info">
            <div class="item-name">${name}</div>
            <div class="item-qty">Qty: ${qty}</div>
          </div>
          <div class="item-price">₹${price}</div>
          <button class="btn-delete" onclick="window.deleteItem('${key}')" ${isPaid?'disabled':''}>✕</button>
        </div>`;
    }).join("");
  }

  // ✅ UPDATE TOTALS (always correct now)
  subtotalEl.textContent = `₹${total}`;
  totalEl.textContent = `₹${total}`;

  itemCountEl.textContent = keys.length;

  // 💳 PAYMENT UI
  document.getElementById("paymentSection").style.display = isPaid ? "none" : "block";
  document.getElementById("paidBanner").style.display = isPaid ? "block" : "none";
  document.getElementById("payBtn").disabled = isPaid || keys.length === 0;
});

  document.getElementById("paymentSection").style.display = isPaid ? "none"  : "block";
  document.getElementById("paidBanner").style.display      = isPaid ? "block" : "none";
  document.getElementById("payBtn").disabled = isPaid || keys.length === 0;
});

window.deleteItem = async (key) => {
  const btn = document.querySelector(`#row-${key} .btn-delete`);
  if (btn) btn.disabled = true;
  try {
    await remove(ref(db, `${CART_ID}/items/${key}`));
    showToast("Item removed");
  } catch(e) {
    showToast("Error: " + e.message);
    if (btn) btn.disabled = false;
  }
};

window.markPaid = async () => {
  await update(ref(db, CART_ID), { payment_status: "PAID" });
};
</script>

<script>
function selectMethod(el) {
  document.querySelectorAll('.pay-method').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  const m = el.dataset.method;
  document.getElementById('cardFields').style.display = m==='card' ? 'block' : 'none';
  document.getElementById('upiFields').style.display  = m==='upi'  ? 'block' : 'none';
  document.getElementById('cashFields').style.display = m==='cash' ? 'block' : 'none';
}

function fmtCard(input) {
  let v = input.value.replace(/\D/g,'').slice(0,16);
  input.value = v.replace(/(.{4})/g,'$1 ').trim();
}
function fmtExpiry(input) {
  let v = input.value.replace(/\D/g,'');
  if (v.length >= 2) v = v.slice(0,2) + '/' + v.slice(2,4);
  input.value = v;
}

async function processPayment() {
  const btn    = document.getElementById('payBtn');
  const method = document.querySelector('.pay-method.active')?.dataset.method;

  if (method === 'card') {
    const num = document.getElementById('cardNum').value.replace(/\s/g,'');
    if (num.length < 16)  { showToast('Enter a valid 16-digit card number'); return; }
    if (document.getElementById('expiry').value.length < 5) { showToast('Enter expiry date'); return; }
  }
  if (method === 'upi') {
    const upi = document.querySelector('#upiFields input').value;
    if (!upi.includes('@')) { showToast('Enter a valid UPI ID (e.g. name@upi)'); return; }
  }
  if (method === 'cash') {
    const cash  = parseFloat(document.getElementById('cashAmount').value);
    const total = parseFloat(document.getElementById('totalDisplay').textContent.replace('₹',''));
    if (!cash || cash < total) { showToast(`Amount must be ≥ ₹${total}`); return; }
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0"></div> Processing…';

  await new Promise(r => setTimeout(r, 1800));

  try {
    await window.markPaid();
    document.getElementById('successOverlay').classList.add('show');
  } catch(e) {
    showToast('Payment failed: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '🔒 Pay Now';
  }
}

function closeSuccess() {
  document.getElementById('successOverlay').classList.remove('show');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
